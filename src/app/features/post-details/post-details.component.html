<div class="mx-auto max-w-7xl px-3 py-3.5">
    <main class="min-w-0">
        <div class="mx-auto max-w-3xl space-y-4">
            <button type="button" (click)="goBack()"
                class="inline-flex items-center gap-2 rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm font-bold text-slate-700 transition hover:bg-slate-50 cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-arrow-left" aria-hidden="true">
                    <path d="m12 19-7-7 7-7"></path>
                    <path d="M19 12H5"></path>
                </svg>
                Back
            </button>
            @if (post) {
            <app-single-post [post]="post"></app-single-post>
            }@else {
            <div role="status" class="max-w-sm p-4 border border-default rounded-base shadow-xs animate-pulse md:p-6">
                <div role="status"
                    class="flex items-center justify-center h-48 max-w-sm bg-neutral-quaternary rounded-base animate-pulse mb-4 sm:mb-6">
                    <svg class="w-11 h-11 text-fg-disabled" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"
                        width="24" height="24" fill="none" viewBox="0 0 24 24">
                        <path stroke="currentColor" stroke-linejoin="round" stroke-width="2"
                            d="M10 3v4a1 1 0 0 1-1 1H5m14-4v16a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V7.914a1 1 0 0 1 .293-.707l3.914-3.914A1 1 0 0 1 9.914 3H18a1 1 0 0 1 1 1ZM9 12h2a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1v-2a1 1 0 0 1 1-1Zm5.697 2.395v-.733l1.269-1.219v2.984l-1.268-1.032Z" />
                    </svg>
                    <span class="sr-only">Loading...</span>
                </div>
                <div class="h-2.5 bg-neutral-quaternary rounded-full w-48 mb-4"></div>
                <div class="h-2 bg-neutral-quaternary rounded-full mb-2.5"></div>
                <div class="h-2 bg-neutral-quaternary rounded-full mb-2.5"></div>
                <div class="h-2 bg-neutral-quaternary rounded-full"></div>
                <div class="flex items-center mt-4">
                    <svg class="w-8 h-8 text-fg-disabled me-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"
                        width="24" height="24" fill="none" viewBox="0 0 24 24">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18Zm0 0a8.949 8.949 0 0 0 4.951-1.488A3.987 3.987 0 0 0 13 16h-2a3.987 3.987 0 0 0-3.951 3.512A8.948 8.948 0 0 0 12 21Zm3-11a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                    </svg>
                    <div>
                        <div class="h-2.5 bg-neutral-quaternary rounded-full w-32 mb-2"></div>
                        <div class="w-48 h-2 bg-neutral-quaternary rounded-full"></div>
                    </div>
                </div>
                <span class="sr-only">Loading...</span>
            </div>

            }
        </div>
    </main>

</div>
