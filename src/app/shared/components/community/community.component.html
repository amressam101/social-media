@if (isLoading) {
<div class="space-y-4">
    <div class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
        <div class="flex items-center gap-3">
            <div class="h-11 w-11 rounded-full bg-slate-200"></div>
            <div class="flex-1 space-y-2">
                <div class="h-4 w-3/4 rounded bg-slate-200"></div>
                <div class="h-3 w-1/2 rounded bg-slate-200"></div>
            </div>
        </div>
        <div class="mt-4 space-y-2">
            <div class="h-4 rounded bg-slate-200"></div>
            <div class="h-4 w-5/6 rounded bg-slate-200"></div>
        </div>
    </div>
    <div class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
        <div class="flex items-center gap-3">
            <div class="h-11 w-11 rounded-full bg-slate-200"></div>
            <div class="flex-1 space-y-2">
                <div class="h-4 w-3/4 rounded bg-slate-200"></div>
                <div class="h-3 w-1/2 rounded bg-slate-200"></div>
            </div>
        </div>
        <div class="mt-4 space-y-2">
            <div class="h-4 rounded bg-slate-200"></div>
            <div class="h-4 w-5/6 rounded bg-slate-200"></div>
        </div>
    </div>
</div>
}@else {
@for (post of postList; track post.id) {
<app-single-post [post]="post" (isDelataPostAll)="thePostIsDeleteAll = $event"
    (isUpdatePostAll)="thePostIsUpadteAll = $event"></app-single-post>
}@empty {
<div class="rounded-2xl border border-slate-200 bg-white p-10 text-center text-slate-500 shadow-sm">
    No posts yet. Be the first one to publish.
</div>
}
}
