<div class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
    <div class="mb-3 flex items-center gap-3">
        <img class="size-11 rounded-full object-cover"
            [src]="userImage? userImage : '/images/imgi_8_default-profile.png' " [alt]="userName">
        <div class="flex-1">
            <p class="text-base font-extrabold text-slate-900">{{userName? userName.split(" " , 1).join(" ") : 'You'}}
            </p>
        </div>
    </div>
    <form (submit)="createPost($event)">
        <!-- input textArea  -->
        <div class="relative">
            <textarea [formControl]="postDescription" rows="4"
                class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-[17px] leading-relaxed text-slate-800 outline-none transition focus:border-primary focus:bg-white "
                placeholder="What's on your mind, {{userName? userName : 'user'}}?"></textarea>
        </div>
        <div class="mt-3 flex flex-wrap items-center justify-between gap-2 border-t border-black pt-3">
            <!-- input file image -->
            <div class="relative flex items-center gap-2">
                <label
                    class="flex cursor-pointer items-center gap-2 rounded-lg px-3 py-2 text-sm font-semibold text-slate-600 transition hover:bg-slate-100">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-image text-emerald-600" aria-hidden="true">
                        <rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect>
                        <circle cx="9" cy="9" r="2"></circle>
                        <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"></path>
                    </svg>
                    <span class="hidden sm:inline">Photo/video</span>
                    <input (change)="perpareUploadFile($event)" class="hidden" type="file">
                </label>
            </div>
            <!-- btn to show the post -->
            <div class="flex items-center gap-3">
                <button type="submit" [disabled]="postDescription.invalid || isLoading" [class]="{
                    'opacity-60' : isLoading,
                    'cursor-not-allowed' : isLoading
                }"
                    class="flex items-center gap-2 rounded-lg bg-primary px-5 py-2 text-sm font-extrabold text-white shadow-sm transition hover:bg-primary-dark cursor-pointer disabled:opacity-60 disabled:cursor-not-allowed ">
                    Post
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-send" aria-hidden="true">
                        <path
                            d="M14.536 21.686a.5.5 0 0 0 .937-.024l6.5-19a.496.496 0 0 0-.635-.635l-19 6.5a.5.5 0 0 0-.024.937l7.93 3.18a2 2 0 0 1 1.112 1.11z">
                        </path>
                        <path d="m21.854 2.147-10.94 10.939"></path>
                    </svg>
                </button>
            </div>
        </div>
    </form>
</div>
